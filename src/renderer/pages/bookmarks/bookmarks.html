<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks | Kiyo</title>
    <link rel="stylesheet" href="bookmarks.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="page-container">
        <header class="page-header">
            <h1><i data-lucide="bookmark"></i> Bookmarks</h1>
            <div class="actions">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" class="unselectable" id="search-input" placeholder="Filter bookmarks...">
                </div>
            </div>
        </header>

        <main id="bookmarks-grid">
            <div class="empty-msg" id="empty-msg">No bookmarks yet — star a page with Ctrl+D</div>
        </main>
    </div>

    <script src="bookmarks.js"></script>
    <script src="../../shared/theme.js"></script>
</body>

</html>
