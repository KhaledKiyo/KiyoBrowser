<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiyo History</title>
    <link rel="stylesheet" href="history.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div id="clear-confirm-overlay" class="confirm-overlay" style="display: none;">
        <div class="confirm-box">
            <h3>Clear History?</h3>
            <p>This action cannot be undone. All your browsing records will be removed.</p>
            <div class="confirm-actions">
                <button id="confirm-cancel">Cancel</button>
                <button id="confirm-clear" class="danger">Clear Everything</button>
            </div>
        </div>
    </div>

    <div class="history-container">
        <header class="history-header">
            <div class="header-left">
                <i data-lucide="history" class="header-icon"></i>
                <h1>History</h1>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" class="unselectable" id="history-search" placeholder="Search history...">
                </div>
                <button class="clear-btn unselectable" id="clear-history">
                    <i data-lucide="trash-2"></i>
                    Clear History
                </button>
            </div>
        </header>

        <main class="history-content" id="history-list">
            <!-- Dynamic content will be injected here -->
        </main>
    </div>

    <script src="history.js"></script>
    <script src="../../shared/theme.js"></script>
</body>

</html>
