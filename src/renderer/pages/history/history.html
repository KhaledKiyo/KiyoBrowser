<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiyo History</title>
    <link rel="stylesheet" href="history.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="history-container">
        <header class="history-header">
            <div class="header-left">
                <i data-lucide="history" class="header-icon"></i>
                <h1>History</h1>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="history-search" placeholder="Search history...">
                </div>
                <button class="clear-btn" id="clear-history">
                    <i data-lucide="trash-2"></i>
                    Clear History
                </button>
            </div>
        </header>

        <main class="history-content" id="history-list">
            <!-- Dynamic content will be injected here -->
        </main>
    </div>

    <script>
        lucide.createIcons();

        const historyList = document.getElementById('history-list');
        const searchInput = document.getElementById('history-search');
        const clearBtn = document.getElementById('clear-history');

        let allHistory = [];

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function getGroupLabel(ts) {
            const date = new Date(ts);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return 'Today';
            if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
            return date.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function renderHistory(items) {
            historyList.innerHTML = '';
            
            if (items.length === 0) {
                historyList.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-dim);">No history found.</div>';
                return;
            }

            const groups = {};
            items.forEach(item => {
                const label = getGroupLabel(item.visitedAt);
                if (!groups[label]) groups[label] = [];
                groups[label].push(item);
            });

            for (const [label, groupItems] of Object.entries(groups)) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'history-group';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'group-title';
                titleDiv.textContent = label;
                groupDiv.appendChild(titleDiv);

                groupItems.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'history-item';
                    itemDiv.onclick = (e) => {
                        if (!e.target.closest('.delete-item')) {
                            window.electronAPI.navigate(item.url);
                        }
                    };

                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'time';
                    timeSpan.textContent = formatTime(item.visitedAt);

                    const faviconWrap = document.createElement('div');
                    faviconWrap.className = 'favicon-wrapper';
                    try {
                        const urlObj = new URL(item.url);
                        const img = document.createElement('img');
                        img.className = 'favicon';
                        img.src = `https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=32`;
                        img.onerror = () => {
                            faviconWrap.innerHTML = '<i data-lucide="globe" class="default-icon"></i>';
                            lucide.createIcons({ root: faviconWrap });
                        };
                        faviconWrap.appendChild(img);
                    } catch (e) {
                        faviconWrap.innerHTML = '<i data-lucide="globe" class="default-icon"></i>';
                    }

                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'entry-info';
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'title';
                    titleSpan.textContent = item.title;
                    const urlSpan = document.createElement('span');
                    urlSpan.className = 'url';
                    urlSpan.textContent = item.url;
                    infoDiv.appendChild(titleSpan);
                    infoDiv.appendChild(urlSpan);

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-item';
                    deleteBtn.innerHTML = '<i data-lucide="x"></i>';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        window.electronAPI.removeHistoryEntry(item.url);
                    };

                    itemDiv.appendChild(timeSpan);
                    itemDiv.appendChild(faviconWrap);
                    itemDiv.appendChild(infoDiv);
                    itemDiv.appendChild(deleteBtn);

                    groupDiv.appendChild(itemDiv);
                });

                historyList.appendChild(groupDiv);
            }
            lucide.createIcons({ root: historyList });
        }

        async function loadHistory() {
            allHistory = await window.electronAPI.getHistory();
            filterHistory();
        }

        function filterHistory() {
            const q = searchInput.value.toLowerCase();
            const filtered = allHistory.filter(h => 
                h.title.toLowerCase().includes(q) || h.url.toLowerCase().includes(q)
            );
            renderHistory(filtered);
        }

        searchInput.addEventListener('input', filterHistory);

        clearBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear all history?')) {
                window.electronAPI.clearHistory();
            }
        });

        window.electronAPI.onHistoryUpdated(() => {
            loadHistory();
        });

        // Initialize Theme integration
        async function initTheme() {
            const settings = await window.electronAPI.getSettings();
            if (settings.theme && settings.theme !== 'default') {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = `../../themes/${settings.theme}.css`;
                document.head.appendChild(link);
            }
        }

        initTheme();
        loadHistory();
    </script>
</body>

</html>
