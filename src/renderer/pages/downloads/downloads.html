<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads | Kiyo</title>
  <link rel="stylesheet" href="downloads.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="downloads-container">
    <header class="downloads-header">
      <h1>Downloads</h1>
      <div class="actions">
        <button id="clear-all" class="unselectable">Clear Downloads History</button>
      </div>
    </header>

    <main class="downloads-list" id="downloads-grid">
      <div class="empty-msg" id="empty-msg">No downloads yet</div>
    </main>
  </div>

  <script src="downloads.js"></script>
  <script src="../../shared/theme.js"></script>
</body>

</html>
