<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiyo Browser</title>
  <link rel="stylesheet" href="index.css">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="browser-container">
    <aside class="browser-sidebar">
      <div class="sidebar-spotlight" id="sidebar-spotlight"></div>
      <div class="sidebar-top">
        <div class="logo">K</div>
        <button class="new-tab-top-btn" id="add-tab-btn" title="New Tab (Ctrl+T)"><i data-lucide="plus"></i></button>
      </div>

      <div class="tabs-list" id="tabs-bar">
        <div class="active-tab-runner" id="active-tab-runner"></div>
        <!-- Vertical tabs injected by renderer.js -->
      </div>

      <div class="sidebar-bottom">
        <div class="sidebar-tools-grid">
          <button class="mini-tool-btn" id="private-window-btn" title="New Private Window (Ctrl+Shift+N)"><i data-lucide="shield"></i></button>
          <button class="mini-tool-btn" id="note-btn" title="Kiyo Note"><i data-lucide="edit-3"></i></button>
          <button class="mini-tool-btn" id="bookmarks-btn" title="Bookmarks (Ctrl+B)"><i data-lucide="bookmark"></i></button>
          <button class="mini-tool-btn" id="history-btn" title="History (Ctrl+H)"><i data-lucide="clock"></i></button>
          <button class="mini-tool-btn" id="passwords-btn" title="Passwords (Ctrl+Shift+P)"><i data-lucide="key"></i></button>
          <button class="mini-tool-btn" id="downloads-toggle" title="Downloads (Ctrl+Shift+J)">
            <i data-lucide="download"></i>
            <span class="badge" id="download-badge" style="display: none;"></span>
          </button>
        </div>
        <div class="sidebar-footer" style="display:flex; gap:8px; justify-content:center; width:100%;">
          <button class="settings-btn" id="menu-btn" title="Settings (Ctrl+,)"><i data-lucide="command"></i></button>
        </div>
      </div>
    </aside>

    <div class="browser-main">
      <header class="floating-header">
        <div class="header-ambient-glow" id="header-ambient-glow"></div>
        <div class="nav-cluster">
          <button id="back-btn" title="Back (Alt+Left)"><i data-lucide="arrow-left"></i></button>
          <button id="forward-btn" title="Forward (Alt+Right)"><i data-lucide="arrow-right"></i></button>
          <button id="reload-btn" title="Reload (Ctrl+R)"><i data-lucide="rotate-cw"></i></button>
        </div>

        <div class="url-pill">
          <span class="url-icon" id="security-indicator"><i data-lucide="globe"></i></span>
          <input type="text" id="url-input" placeholder="Search the void or enter a URL..." spellcheck="false">
          <div id="autocomplete-list" class="autocomplete-list" style="display: none;"></div>
          <div class="loading-bar" id="loader" style="display: none;"></div>
        </div>

        <button class="side-btn bookmark-star" id="bookmark-star-btn" title="Bookmark this page (Ctrl+D)">
          <i data-lucide="star"></i>
        </button>
        <button class="side-btn reader-mode-btn" id="reader-mode-btn" title="Reader Mode (Ctrl+Shift+R)" style="display:none">
          <i data-lucide="book-open"></i>
        </button>
      </header>
      
      <!-- Find Bar -->
      <div id="find-bar" class="find-bar" style="display: none;">
        <i data-lucide="search"></i>
        <input type="text" id="find-input" placeholder="Find in page...">
        <span id="find-results">0/0</span>
        <div class="find-actions">
          <button id="find-prev" title="Previous"><i data-lucide="chevron-up"></i></button>
          <button id="find-next" title="Next"><i data-lucide="chevron-down"></i></button>
          <button id="find-close" title="Close"><i data-lucide="x"></i></button>
        </div>
      </div>

      <main id="browser-content">
        <div class="initial-load-placeholder">
          <div class="spinner"></div>
        </div>
      </main>
    </div>
  </div>



  <div id="tab-search-overlay" class="tab-search-overlay" style="display: none;">
    <div class="tab-search-box">
      <i data-lucide="search"></i>
      <input type="text" id="tab-search-input" placeholder="Search tabs and history...">
    </div>
    <div id="tab-search-results" class="tab-search-results"></div>
  </div>

  <div id="tab-tooltip" class="tab-tooltip" style="display:none">
    <div class="tt-title"></div>
    <div class="tt-url"></div>
    <img class="tt-preview" id="tt-preview" style="display:none" />
  </div>

  <!-- Custom input dialog (replaces window.prompt which is disabled in Electron sandbox) -->
  <div id="kiyo-dialog-overlay" style="display:none;position:fixed;top:0;left:var(--sidebar-width);right:0;height:var(--header-height);z-index:999999;background:var(--bg-header);backdrop-filter:blur(var(--header-blur));align-items:center;padding:0 24px;gap:16px;border-bottom:1px solid var(--border-color);box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <div id="kiyo-dialog-label" style="font-size:14px;font-weight:600;color:var(--text-main);white-space:nowrap;"></div>
    <input id="kiyo-dialog-input" type="text" style="flex-grow:1;background:rgba(255,255,255,0.05);border:1px solid var(--border-color);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text-main);outline:none;font-family:inherit;min-width:0;" placeholder="">
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button id="kiyo-dialog-cancel" style="padding:6px 14px;border-radius:8px;border:1px solid var(--border-color);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.2s;">Cancel</button>
      <button id="kiyo-dialog-ok" style="padding:6px 14px;border-radius:8px;border:none;background:var(--arch-blue);color:#000;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;">OK</button>
    </div>
  </div>

  <script src="../shared/theme.js"></script>
  <script src="renderer.js"></script>
  <script>lucide.createIcons();</script>
</body>

</html>
